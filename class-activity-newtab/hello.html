<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Programming Quotes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./hello.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="quote-card">
        <p class="eyebrow">Chrome Extension Activity</p>
        <h1>Loading a programming quote...</h1>
        <p class="subtext">
          Open a new tab to get a fresh quote from the class API.
        </p>
        <div class="actions">
          <button id="refresh-quote" type="button">Show another quote</button>
          <p id="status-message" aria-live="polite"></p>
        </div>
      </section>
    </main>

    <script src="./hello.js"></script>
  </body>
</html>
