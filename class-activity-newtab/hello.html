<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Programming Quotes</title>
    <link rel="stylesheet" href="./hello.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="quote-card">
        <p class="eyebrow">Chrome Extension Activity</p>
        <h1>Programming Quotes</h1>

        <div class="quote-box">
          <p class="quote-mark" aria-hidden="true">"</p>
          <p id="quote-text">Loading a programming quote...</p>
        </div>

        <div class="actions">
          <button id="refresh-quote" type="button">Show another quote</button>
        </div>

        <p id="status-message" aria-live="polite"></p>
      </section>
    </main>

    <script src="./hello.js"></script>
  </body>
</html>
